<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS6515 Exam 2 Study Guide</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e2e4ea;
  --text-dim: #9ca3b8;
  --accent: #6c9eff;
  --accent-dim: #4a7ae6;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --radius: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* NAV TABS */
.tab-bar {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: sticky;
  top: 0;
  z-index: 100;
}

.tab-btn {
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 8px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
  transition: all 0.2s;
}

.tab-btn:hover { background: var(--surface2); color: var(--text); }
.tab-btn.active { background: var(--accent-dim); color: #fff; }

.tab-content { display: none; padding: 24px 16px; max-width: 900px; margin: 0 auto; }
.tab-content.active { display: block; }

/* HEADER */
h1 { font-size: 28px; margin-bottom: 4px; }
.subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }

/* SECTION HEADERS */
.section-title {
  font-size: 20px;
  font-weight: 700;
  margin: 32px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* INSTRUCTION BOX */
.instruction-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
}

.instruction-box .step {
  margin-bottom: 8px;
  color: var(--text);
}

.instruction-box .step strong { color: var(--accent); }

/* TOOLKIT GRID */
.toolkit-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-top: 20px;
  margin-bottom: 32px;
}
@media (max-width: 900px) { .toolkit-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px) { .toolkit-grid { grid-template-columns: repeat(2, 1fr); } }

.toolkit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}

.toolkit-card .tk-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 6px;
}

.toolkit-card .tk-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.toolkit-card .tk-desc {
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.4;
}

/* Section heading with link icon */
.section-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text);
  margin-top: 32px;
  margin-bottom: 16px;
}

.section-heading .link-icon {
  color: var(--accent);
  font-size: 16px;
}

/* INSTANT MATCH GRID */
.match-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 32px;
}

@media (max-width: 600px) { .match-grid { grid-template-columns: 1fr; } }

.match-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  gap: 12px;
}

.match-card .scenario { color: var(--text-dim); font-size: 14px; }
.match-card .algo { color: var(--accent); font-weight: 600; font-size: 14px; text-align: right; }

/* COLLAPSIBLE SECTIONS */
.collapsible {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}

.collapsible-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}

.collapsible-header:hover { background: var(--surface2); }

.collapsible-header .label {
  font-weight: 600;
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.collapsible-header .count {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 400;
}

.collapsible-header .chevron {
  color: var(--text-dim);
  font-size: 18px;
  transition: transform 0.3s;
}

.collapsible.open > .collapsible-header .chevron { transform: rotate(180deg); }

.collapsible-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.collapsible.open > .collapsible-body { max-height: 50000px; }

.collapsible-body-inner { padding: 0 20px 20px; }

.category-intro {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 16px;
  line-height: 1.6;
}

/* PATTERN CARDS */
.pattern {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}

.pattern-header {
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}

.pattern-header:hover { background: rgba(108,158,255,0.06); }

.pattern-prompt {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.pattern-prompt em { color: var(--text); font-style: italic; }

.pattern-algo {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
}

.pattern-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.pattern.open > .pattern-body { max-height: 10000px; }

.pattern-body-inner {
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
}

.detail-block {
  margin-top: 14px;
}

.detail-block h4 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  font-weight: 700;
}

.detail-block.why h4 { color: var(--yellow); }
.detail-block.how h4 { color: var(--cyan); }
.detail-block.example h4 { color: var(--purple); }
.detail-block.use-when h4 { color: var(--green); }
.detail-block.do-not h4 { color: var(--red); }

.detail-block p, .detail-block li {
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.6;
}

.detail-block ul {
  list-style: none;
  padding: 0;
}

.detail-block.use-when li::before { content: "✓ "; color: var(--green); font-weight: bold; }
.detail-block.do-not li::before { content: "✗ "; color: var(--red); font-weight: bold; }

.detail-block li { margin-bottom: 4px; }

/* TABLES */
table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 20px;
  font-size: 14px;
}

th {
  background: var(--surface2);
  color: var(--accent);
  text-align: left;
  padding: 10px 12px;
  border: 1px solid var(--border);
  font-weight: 600;
  white-space: nowrap;
}

td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  color: var(--text-dim);
  vertical-align: top;
}

tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

@media (max-width: 600px) {
  table { font-size: 12px; }
  th, td { padding: 6px 8px; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
}

/* ALGORITHM REFERENCE CARDS */
.algo-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}

.algo-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}

.algo-card-header:hover { background: var(--surface2); }

.algo-card-header .algo-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}

.algo-card-header .algo-meta {
  font-size: 13px;
  color: var(--text-dim);
  text-align: right;
}

.algo-card-header .algo-meta span { display: block; }

.algo-card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.algo-card.open > .algo-card-body { max-height: 10000px; }

.algo-card-body-inner { padding: 0 20px 20px; }

.algo-card-body-inner .algo-desc {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 16px;
  font-style: italic;
}

.io-section { margin-bottom: 14px; }

.io-section h4 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  font-weight: 700;
}

.io-section.inputs h4 { color: var(--cyan); }
.io-section.outputs h4 { color: var(--yellow); }
.io-section.use h4 { color: var(--green); }
.io-section.no-use h4 { color: var(--red); }
.io-section.tricks h4 { color: var(--purple); }

.io-section ul { list-style: none; padding: 0; }
.io-section li { font-size: 14px; color: var(--text-dim); margin-bottom: 4px; padding-left: 16px; position: relative; }
.io-section li::before { content: "•"; position: absolute; left: 0; color: var(--text-dim); }
.io-section.use li::before { content: "✓"; color: var(--green); }
.io-section.no-use li::before { content: "✗"; color: var(--red); }
.io-section.tricks li::before { content: "→"; color: var(--purple); }

/* OFFICE HOURS */
.oh-session {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}

.oh-session-header {
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.oh-session-header:hover { background: var(--surface2); }

.oh-session-header .oh-title { font-weight: 700; font-size: 16px; }
.oh-session-header .oh-date { color: var(--text-dim); font-size: 13px; }

.oh-session-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.oh-session.open > .oh-session-body { max-height: 50000px; }

.oh-session-body-inner { padding: 0 20px 20px; }

.oh-topic {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.oh-topic h4 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--accent);
}

.oh-topic p, .oh-topic li {
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.6;
}

.oh-topic ul { list-style: none; padding: 0; margin-top: 8px; }
.oh-topic li { margin-bottom: 4px; padding-left: 16px; position: relative; }
.oh-topic li::before { content: "•"; position: absolute; left: 0; }

.oh-topic .exam-hint {
  margin-top: 8px;
  padding: 8px 12px;
  background: rgba(251,191,36,0.08);
  border-left: 3px solid var(--yellow);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 13px;
  color: var(--yellow);
}

/* EXAM TIPS CARDS */
.tips-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

@media (max-width: 600px) { .tips-cards { grid-template-columns: 1fr; } }

.tip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.tip-card h3 {
  font-size: 15px;
  margin-bottom: 8px;
  color: var(--accent);
}

.tip-card p { font-size: 14px; color: var(--text-dim); }

/* KEYWORD MAP */
.keyword-list { margin-bottom: 24px; }

.keyword-item {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  gap: 16px;
}

.keyword-item:last-child { border-bottom: none; }

.keyword-item .kw {
  font-size: 14px;
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', monospace;
  flex-shrink: 0;
}

.keyword-item .kw-algo {
  font-size: 14px;
  color: var(--accent);
  font-weight: 600;
  text-align: right;
}

/* MISTAKE CARD */
.mistake-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--red);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
}

.mistake-card h4 { font-size: 14px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
.mistake-card p { font-size: 14px; color: var(--text-dim); }

/* INPUT MOD CARD */
.mod-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--cyan);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
}

.mod-card h4 { font-size: 14px; font-weight: 700; color: var(--cyan); margin-bottom: 6px; }
.mod-card p { font-size: 14px; color: var(--text-dim); }

/* FORMAT CARD */
.format-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
}

.format-card h4 { font-size: 14px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
.format-card p { font-size: 14px; color: var(--text-dim); }
</style>
</head>
<body>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="compare" data-src="tabs/quick-compare.html">Black Box Reference</button>
  <button class="tab-btn" data-tab="pattern" data-src="tabs/pattern-recognition.html">Pattern Recognition</button>
  <button class="tab-btn" data-tab="combo" data-src="tabs/combo-patterns.html">Combo Patterns</button>
  <button class="tab-btn" data-tab="lectures" data-src="tabs/lectures.html">Lectures</button>
  <button class="tab-btn" data-tab="office" data-src="tabs/office-hours.html">Office Hours</button>
  <button class="tab-btn" data-tab="reference" data-src="tabs/algorithms-reference.html">Algorithm Reference</button>
  <button class="tab-btn" data-tab="tips" data-src="tabs/exam-tips.html">Exam Tips</button>
  <button class="tab-btn" data-tab="facts" data-src="tabs/quick-facts.html">Quick Facts</button>
</nav>

<!-- Tab containers get created dynamically -->
<div id="tab-container"></div>

<script>
const container = document.getElementById('tab-container');
const tabCache = {};

function bindInteractive(el) {
  el.querySelectorAll('.collapsible-header').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });
  el.querySelectorAll('.pattern-header').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });
  el.querySelectorAll('.algo-card-header').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });
  el.querySelectorAll('.oh-session-header').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });
}

async function loadTab(tabName, src) {
  // Hide all tabs
  container.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

  // If already loaded, just show it
  const existing = document.getElementById('tab-' + tabName);
  if (existing) {
    existing.classList.add('active');
    return;
  }

  // Fetch and create
  try {
    const resp = await fetch(src);
    const html = await resp.text();
    const div = document.createElement('div');
    div.className = 'tab-content active';
    div.id = 'tab-' + tabName;
    div.innerHTML = html;
    container.appendChild(div);
    bindInteractive(div);
  } catch (e) {
    const div = document.createElement('div');
    div.className = 'tab-content active';
    div.id = 'tab-' + tabName;
    div.innerHTML = '<h1>Error</h1><p class="subtitle">Could not load tab content.</p>';
    container.appendChild(div);
  }
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTab(btn.dataset.tab, btn.dataset.src);
  });
});

// Load first tab on page load
const firstBtn = document.querySelector('.tab-btn.active');
loadTab(firstBtn.dataset.tab, firstBtn.dataset.src);
</script>
</body>
</html>
